services:
  backend:
    container_name: ${CONTAINER_PREFIX}_backend
    build: ./backend
    restart: always
    # SEGURANÇA: Não publicar o backend diretamente.
    # Deve ser exposto apenas via reverse-proxy (80/81/443).
    # env_file is loaded via docker compose --env-file flag
    environment:
      - GIN_MODE=release
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webnet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    container_name: ${CONTAINER_PREFIX}_frontend
    build:
      context: ./frontend
    restart: always
    # SEGURANÇA: Não publicar o frontend diretamente.
    # Deve ser exposto apenas via reverse-proxy (80/81/443).
    # Ports exposed for direct access (optional - NPM routes via webnet)
    # ports:
    #   - "${FRONTEND_PORT:-80}:80"
    environment:
      - API_URL=${BACKEND_URL}
      - BACKEND_HOST=${BACKEND_HOST:-backend}
      - PUBLIC_URL=${FRONTEND_URL}
    networks:
      - webnet

  db:
    container_name: ${CONTAINER_PREFIX}_db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    # SEGURANÇA: Porta NÃO exposta publicamente.
    # Apenas acessível via rede interna Docker.
    # Para acesso local: docker compose exec db psql -U postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - webnet

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME}_postgres_data

networks:
  webnet:
    external: true
