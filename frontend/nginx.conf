server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Never cache the HTML shell; it must update to reference new hashed bundles.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Runtime-injected config (API URL). Generated by the container CMD from
    # config.js.template via envsubst. Must never be cached, or env swaps
    # (dev ↔ prod) would read a stale API URL baked into a prior container.
    location = /config.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Proxy API requests to backend
    location ^~ /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_host "${BACKEND_HOST}";

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_pass http://$backend_host:8080;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # No long-lived cache — filenames are unhashed, so any long expires would
    # leave browsers pinned to stale JS/CSS after a deploy. no-cache still lets
    # the browser revalidate cheaply via ETag (304s), just never serve blind.
    location ~* \.(js|jsx|css|png|jpg|jpeg|gif|ico|svg|wasm)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
